name: Validate Environment Safety

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  NEXT_PUBLIC_API_BASE_URL: https://api.example.test
  API_BASE_URL: https://api.example.test
  GOOGLE_CLIENT_ID: test-google-client-id
  GOOGLE_CLIENT_SECRET: test-google-client-secret
  GOOGLE_REDIRECT_URI: https://api.example.test/google/oauth/callback
  SESSION_SECRET: test-session-secret
  FORMS_SECRET: test-forms-secret
  CRON_SECRET: test-cron-secret
  OPENAI_KEY: test-openai-key

jobs:
  env-safety-check:
    name: Environment Safety Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded localhost URLs
        run: |
          echo "Checking for hardcoded localhost URLs..."
          if rg --hidden --glob '!node_modules/**' --glob '!.next/**' --glob '!coverage/**' --glob '!*.test.*' --glob '!*.spec.*' --glob '!*.e2e.*' "localhost:3" .; then
            echo "Use environment variables instead of localhost URLs."
            exit 1
          fi

      - name: Check for leaked secrets patterns
        run: |
          echo "Checking for potential leaked secrets..."
          PATTERN='(sk_live_|pk_live_|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|xox[baprs]-[0-9a-zA-Z]{10,})'
          if rg --hidden --glob '!node_modules/**' --glob '!.next/**' --glob '!package-lock.json' --glob '!yarn.lock' "$PATTERN" .; then
            echo "Potential secrets detected."
            exit 1
          fi

      - name: Verify local env files are not committed
        run: |
          test ! -f .env.local
          test ! -f .env.development.local
          test ! -f .env.production.local

      - name: Verify .gitignore protects env files
        run: |
          rg "\.env\.local" .gitignore
          rg "\.env\.development\.local" .gitignore

  quality-gates:
    name: Typecheck, Lint, Build, Stability Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run targeted stability tests
        run: npm run test:stability
